name: Update Dashboard Data

on:
  schedule:
    - cron: '30 3 * * *'    #  9:00 AM IST
    - cron: '30 4 * * *'    # 10:00 AM IST
    - cron: '30 7 * * *'    #  1:00 PM IST
    - cron: '30 10 * * *'   #  4:00 PM IST
  workflow_dispatch:          # Manual trigger via Refresh button or GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r Team_Metrics_Dashboard/requirements.txt

      - name: Fetch data from Google Sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python Team_Metrics_Dashboard/scripts/fetch.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Team_Metrics_Dashboard/data/metrics.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
